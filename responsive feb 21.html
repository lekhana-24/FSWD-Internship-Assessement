<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Hero Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f8fb;
}

.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:60px 10%;
    min-height:100vh;
}

.hero-text{
    flex:1;
}

.hero-text h1{
    font-size:48px;
    color:#1a1a1a;
    margin-bottom:20px;
}

.hero-text p{
    font-size:18px;
    color:#555;
    margin-bottom:30px;
    line-height:1.6;
}

.hero-text button{
    padding:12px 28px;
    font-size:16px;
    background:#0077ff;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.hero-text button:hover{
    background:#0056cc;
}

.hero-image{
    flex:1;
    text-align:right;
}

.hero-image img{
    max-width:100%;
    height:auto;
}

/* Responsive Design */
@media (max-width:768px){

    .hero{
        flex-direction:column;
        text-align:center;
        padding:40px 5%;
    }

    .hero-image{
        margin-top:30px;
        text-align:center;
    }

    .hero-text h1{
        font-size:32px;
    }
}
</style>

</head>
<body>

<section class="hero">
    
    <div class="hero-text">
        <h1>Build Modern Websites</h1>
        <p>
            Create responsive layouts using Flexbox. 
            Your design adapts smoothly across desktop, tablet, and mobile screens.
        </p>
        <button>Get Started</button>
    </div>

    <div class="hero-image">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="Web Development">
    </div>

</section>

</body>
</html>
